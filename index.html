<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Cat Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="main-wrapper">
    <div class="container">
      <header>
        <h1>Cat World</h1>
        <p class="subtitle">Discover beautiful feline breeds</p>
      </header>
      
      <div class="card">
        <div class="image-wrapper">
          <div class="loader" id="loader"></div>
          <img id="cat_image" src="" alt="A beautiful cat will appear here shortly">
        </div>
        <div class="info">
          <h2 id="breed_name">Connecting...</h2>
          <p id="breed_desc">Searching for the perfect cat for you.</p>
        </div>
      </div>

      <button id="next_btn">Show Another Cat</button>
    </div>

    <footer class="student-footer">
      <div class="footer-content">
        <p class="attribution">Виконав студент</p>
        <p class="university">Національного Технічного Університету<br>"Харківський Політехнічний Інститут"</p>
        <p class="student-name">Потапенко Ілля</p>
        <p class="group">Група 223 нб</p>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
